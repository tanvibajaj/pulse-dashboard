name: Daily Pulse Refresh                                            
                                                                                                                
on:
    schedule:
      - cron: "0 13 * * *"
    workflow_dispatch:

jobs:
    refresh:
      runs-on: ubuntu-latest
      timeout-minutes: 10
                                                                                                                  
      steps:
        - uses: actions/checkout@v4                                                                               
                                                                       
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install Claude Code CLI
          run: npm install -g @anthropic-ai/claude-code

        - name: Install Python dependencies
          run: pip install yfinance

        - name: Run news & market refresh
          env:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          run: bash scripts/refresh.sh

        - name: Run podcast refresh
          env:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          run: bash scripts/podcasts.sh                                                                           
   
        - name: Commit and push                                                                                   
          run: |                                                       
            git config user.name "Pulse Bot"
            git config user.email "pulse-bot@users.noreply.github.com"
            git add data/dashboard.json data/podcasts/                                                            
            git diff --cached --quiet || {
              git commit -m "Daily Pulse refresh $(date +%Y-%m-%d)"                                               
              git pull --rebase origin main                            
              git push                   
            }
